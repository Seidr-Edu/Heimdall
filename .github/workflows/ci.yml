name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install quality tools
        run: python -m pip install --upgrade pip ruff mypy

      - name: Lint
        run: bash tests/lint.sh

      - name: Format
        run: bash tests/format.sh

      - name: Typecheck
        run: bash tests/typecheck.sh

      - name: Test
        run: bash tests/run.sh
