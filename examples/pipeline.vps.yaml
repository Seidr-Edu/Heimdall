# VPS-oriented Heimdall manifest.
# Update run_id before each fresh `heimdall.cli run`.

version: 1
run_id: 20260313T000000Z__vps

source:
  repo_url: https://github.com/seidr-edu/Eitri.git
  commit_sha: 14be0f5d3f464b3eb759fe4898b51523fb14e78e

images:
  brokk: ghcr.io/seidr-edu/brokk:v1.0.0
  eitri: ghcr.io/seidr-edu/eitri:v1.9.0
  andvari: ghcr.io/seidr-edu/andvari:v1.0.2
  kvasir: ghcr.io/seidr-edu/kvasir:v1.0.2
  lidskjalv: ghcr.io/seidr-edu/lidskjalv:v1.1.1

eitri:
  source_relpaths:
    - .
  parser_extension: .java
  writer_extension: .puml
  verbose: true

andvari:
  gating_mode: model
  max_iter: 8
  max_gate_revisions: 3
  model_gate_timeout_sec: 120

kvasir:
  max_iter: 5
  write_scope_ignore_prefixes:
    - completion/proof/logs

lidskjalv:
  skip_sonar: false
  original:
    project_key: heimdall_vps_original
    project_name: Heimdall VPS original
  generated:
    project_key: heimdall_vps_generated
    project_name: Heimdall VPS generated
