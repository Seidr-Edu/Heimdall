version: 1
queue_root: /srv/pipeline/queue
runs_root: /srv/pipeline/runs
# Provider CLI to use for Andvari/Kvasir steps. Choices: codex (default), claude.
# For codex: codex_home_dir must contain auth.json, config.toml, skills/.system/
# For claude: codex_home_dir must contain credentials.json and settings.json
provider: codex
codex_bin_dir: /srv/pipeline/provider/codex/bin
codex_host_bin_dir: /srv/pipeline/provider/codex/bin
codex_home_dir: /srv/pipeline/provider/codex/home
pull_policy: if-missing
verbose: false
# This setting is required for the always-on Andvari restricted-egress path.
# Host infrastructure, not Heimdall env vars, is the source of truth for
# transparent HTTP/S interception and blocked-bypass logging.
andvari_internal_network_name: andvari-egress

images:
  brokk: ghcr.io/seidr-edu/brokk:v1.0.0
  eitri: ghcr.io/seidr-edu/eitri:v1.11.0
  andvari: ghcr.io/seidr-edu/andvari:v1.0.1
  mimir: ghcr.io/seidr-edu/mimir:v1.0.0
  kvasir: ghcr.io/seidr-edu/kvasir:v1.0.1
  lidskjalv: ghcr.io/seidr-edu/lidskjalv:v1.1.1

eitri:
  source_relpaths:
    - .
  parser_extension: .java
  writer_extension: .puml
  verbose: true

andvari:
  gating_mode: model
  max_iter: 8
  max_gate_revisions: 3
  model_gate_timeout_sec: 120

kvasir:
  max_iter: 5
  write_scope_ignore_prefixes:
    - completion/proof/logs

lidskjalv:
  skip_sonar: false
  original:
    project_key: example_original
    project_name: Example original
  generated:
    project_key: example_generated
    project_name: Example generated
